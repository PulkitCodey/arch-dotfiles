[bar/clock]
;; Shrink width to 6% for a "stamp" look
width = 6%
;; Math: (100 - 6) / 2 = 47% offset
offset-x = 47%
offset-y = 5
;; Height must be enough to house the bigger font
height = 32
radius = 20

fixed-center = true
override-redirect = true
wm-restack = i3
shadow = false

;; High-Contrast Gothic
background = #cc050505
foreground = #ffffff
border-size = 1
border-color = #4a0404

;; FONT: Cranking it to 22. 
;; The ";6" is the "Vertical Alignment". Adjust this to center it perfectly top-to-bottom.
font-0 = "Cormorant Garamond:style=Bold:size=18;0"

modules-center = clock-text

#################################
# THE BATTERY CAPSULE (Right)
#################################
[bar/battery]
;; Switching to absolute pixels for consistency
width = 80
height = 28
offset-x = 94%
offset-y = 5
radius = 14

;; Center the content inside the capsule
fixed-center = true
override-redirect = true
wm-restack = i3

;; Clean Gothic Palette
background = #66050505
foreground = #ffffff

;; FONT: Added vertical offset (the ;3) to center the icons
font-0 = "Cormorant Garamond:style=Bold:size=11;3"
font-1 = "JetBrainsMono Nerd Font:size=12;4"

modules-center = battery-module
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/clock-text]
type = internal/date
interval = 1
date = "%H:%M"

;; Zero out all padding to let the font fill the space
label-padding = 0
format-padding = 0

[module/battery-module]
type = custom/script
exec = ~/.config/polybar/scripts/battery.sh
interval = 30
label-padding = 2

[settings]
screenchange-reload = true
pseudo-transparency = true
