backend = "glx";
vsync = true;

#################################
# SHADOWS (The Gothic Gloom)
#################################
shadow = true;
shadow-radius = 20;
shadow-opacity = 0.8;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-color = "#000000";

shadow-exclude = [
  "class_g = 'Polybar'",
  "name = 'Notification'"
];

#################################
# FADING
#################################
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;

#################################
# TRANSPARENCY
#################################
inactive-opacity = 0.70;
active-opacity = 0.96;

#################################
# BLUR (High-Density Glass)
#################################
blur-method = "dual_kawase";
blur-strength = 5; # Increased to make it less "faded" and more "solid glass"

blur-background = true;
# Removed blur-background-frame because it causes the "faded out" look

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
# CORNERS
#################################
corner-radius = 0;

#################################
# GENERAL
#################################
detect-rounded-corners = true;
detect-client-opacity = true;
use-damage = true;
