# ---------------------------------------------------------
# KITTY GOTHIC CONFIGURATION - VAMPIRE HIGH-CONTRAST
# Font: JetBrains Mono | Theme: Obsidian, Crimson & Silver
# ---------------------------------------------------------

# --- Font Configuration ---
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# --- Keybindings (Copy/Paste) ---
map ctrl+c copy_and_clear_or_interrupt
map ctrl+v paste_from_clipboard

# --- Core Gothic Aesthetics ---
background            #050505
foreground            #e0e0e0
cursor                #ff0000
cursor_text_color     #000000
selection_foreground  #ffffff
selection_background  #5f0000

# Window Borders & Tabs
active_border_color     #ff0000
inactive_border_color   #262626
active_tab_foreground   #ffffff
active_tab_background   #440000
inactive_tab_foreground #808080
inactive_tab_background #050505

# --- High-Visibility Gothic Palette ---
# Black / Grey
color0 #1a1a1a
color8 #666666

# Red (Blood / Errors)
color1  #880808
color9  #AA0000

# Green (Poison / Success)
color2 #228b22
color10 #32cd32

# Yellow (Parchment / Warnings)
color3 #b8860b
color11 #ffd700

# Blue (Midnight / Directories - Brightened for visibility)
color4 #5fafff
color12 #87ceeb

# Magenta (Withered Rose / Highlights)
color5 #800080
color13 #d700d7

# Cyan (Cold Mist / Links)
color6 #008b8b
color14 #00ffff

# White (Bone / Main Text)
color7 #d3d3d3
color15 #ffffff

# --- Layout & Polish ---
window_padding_width 15
background_opacity   0.95
hide_window_decorations yes
confirm_os_window_close 0
bold_is_bright yes

symbol_map U+1F441 Noto Color Emoji
